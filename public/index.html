<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zenith App</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      flex-grow: 1;
    }
    .header {
      background-color: #111827;
      color: white;
      padding: 1rem 2rem;
    }
    .footer {
      background-color: #f3f4f6;
      padding: 1rem 2rem;
      text-align: center;
    }
    .btn {
      display: inline-block;
      padding: 0.5rem 1rem;
      background-color: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 0.25rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Zenith App</h1>
  </div>
  
  <div class="container">
    <h2>Maintenance Mode</h2>
    <p>The application is currently in maintenance mode while we fix some styling issues.</p>
    <p>We're working to resolve these issues as quickly as possible.</p>
    
    <a href="/dashboard" class="btn">Try Dashboard</a>
  </div>
  
  <div class="footer">
    <p>© 2025 Zenith App</p>
  </div>
</body>
</html>
